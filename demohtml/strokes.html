<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔画学习 - 汉字书写学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f8f8f8;
            color: #333;
            font-size: 16px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            background-color: #e74c3c;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        
        .back-button {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .app-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        .stroke-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .stroke-display {
            display: flex;
            align-items: center;
        }
        
        .current-stroke-icon {
            font-size: 2rem;
            color: #e74c3c;
            margin-right: 15px;
        }
        
        .stroke-info {
            flex: 1;
        }
        
        .stroke-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        
        .stroke-desc {
            font-size: 0.9rem;
            color: #666;
        }
        
        .stroke-nav {
            display: flex;
            gap: 10px;
        }
        
        .nav-button {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #666;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .nav-button:hover {
            background-color: #f1f1f1;
            color: #e74c3c;
        }
        
        .practice-area {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .practice-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .practice-title {
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .control-buttons {
            display: flex;
            gap: 10px;
        }
        
        .control-button {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #666;
            cursor: pointer;
        }
        
        .control-button:hover {
            color: #e74c3c;
        }
        
        .canvas-container {
            position: relative;
            border: 2px dashed #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        #drawing-canvas {
            width: 100%;
            height: 400px;
            background-color: #f9f9f9;
            background-image: 
                linear-gradient(#e5e5e5 1px, transparent 1px),
                linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: none;
        }
        
        .guide-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .action-buttons {
            display: flex;
            justify-content: space-between;
        }
        
        .action-button {
            padding: 12px 24px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1.1rem;
        }
        
        .feedback-button {
            background-color: #3498db;
            color: white;
            flex: 1;
            margin-right: 10px;
        }
        
        .feedback-button:hover {
            background-color: #2980b9;
        }
        
        .next-button {
            background-color: #e74c3c;
            color: white;
            flex: 1;
            margin-left: 10px;
        }
        
        .next-button:hover {
            background-color: #c0392b;
        }
        
        .feedback-panel {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .feedback-title {
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feedback-content {
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .assistant-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #e74c3c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        
        .assistant-button:hover, .assistant-button:focus {
            background-color: #c0392b;
        }
        
        .vibration-pattern {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #f1f1f1;
            border-radius: 20px;
            width: fit-content;
        }
        
        .vibration-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e74c3c;
        }
        
        .dot-low {
            opacity: 0.3;
        }
        
        .dot-medium {
            opacity: 0.6;
        }
        
        .dot-high {
            opacity: 1;
        }
        
        footer {
            text-align: center;
            padding: 15px;
            background-color: #f1f1f1;
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <header>
        <a href="index.html" class="back-button">←</a>
        <h1 class="app-title">笔画学习</h1>
        <button id="voice-assist" style="position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 22px;">🔊</button>
    </header>
    
    <!-- 主要内容区域 -->
    <div class="main-content">
        <!-- 简化的笔画选择器 -->
        <div class="stroke-selector">
            <div class="stroke-display">
                <div class="current-stroke-icon" id="stroke-icon">一</div>
                <div class="stroke-info">
                    <div class="stroke-name" id="stroke-name">横</div>
                    <div class="stroke-desc" id="stroke-desc">从左到右画一条直线</div>
                    <div class="vibration-pattern">
                        <span class="vibration-dot dot-low"></span>
                        <span class="vibration-dot dot-medium"></span>
                        <span class="vibration-dot dot-high"></span>
                    </div>
                </div>
            </div>
            <div class="stroke-nav">
                <button class="nav-button" id="prev-stroke" aria-label="上一个笔画">◀</button>
                <button class="nav-button" id="next-stroke" aria-label="下一个笔画">▶</button>
            </div>
        </div>
        
        <!-- 扩大的练习区域 -->
        <div class="practice-area">
            <div class="practice-header">
                <h3 class="practice-title">练习区域 - 请按照语音提示绘制<span id="current-stroke">横</span>笔画</h3>
                <div class="control-buttons">
                    <button class="control-button" id="play-guide" aria-label="播放引导">▶️</button>
                    <button class="control-button" id="clear-canvas" aria-label="清除画布">🔄</button>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="drawing-canvas"></canvas>
                <div class="guide-animation" id="guide-animation"></div>
            </div>
            
            <div class="action-buttons">
                <button class="action-button feedback-button">
                    <span style="margin-right: 5px;">👆</span>触感引导
                </button>
                <button class="action-button next-button">
                    下一个笔画 <span style="margin-left: 5px;">→</span>
                </button>
            </div>
        </div>
        
        <div class="feedback-panel">
            <h3 class="feedback-title">
                <span>学习提示</span>
                <span style="font-size: 24px;">💡</span>
            </h3>
            <div class="feedback-content">
                <p><strong>横</strong>笔画是从左到右画一条直线。</p>
                <p>使用指尖轻触屏幕左侧，然后保持均匀力度向右滑动。</p>
                <p>注意感受振动引导：开始轻微，中间适中，结束加强。</p>
                <p>系统会通过语音和振动来引导您完成笔画。</p>
            </div>
        </div>
    </div>
    
    <!-- 更大的语音助手按钮 -->
    <button class="assistant-button" aria-label="语音助手">🗣️</button>
    
    <footer>
        视障人士汉字书写学习应用 © 2023
    </footer>
    
    <script>
        // 定义笔画数据
        const strokes = [
            { name: "横", icon: "一", desc: "从左到右画一条直线" },
            { name: "竖", icon: "丨", desc: "从上到下画一条直线" },
            { name: "撇", icon: "丿", desc: "从右上向左下画斜线" },
            { name: "捺", icon: "㇏", desc: "从左上向右下画斜线" },
            { name: "点", icon: "丶", desc: "轻点用力按下" },
            { name: "折", icon: "⺄", desc: "转折改变方向" }
        ];
        
        let currentStrokeIndex = 0;
        
        // 更新显示的笔画信息
        function updateStrokeDisplay() {
            const stroke = strokes[currentStrokeIndex];
            document.getElementById('stroke-icon').textContent = stroke.icon;
            document.getElementById('stroke-name').textContent = stroke.name;
            document.getElementById('stroke-desc').textContent = stroke.desc;
            document.getElementById('current-stroke').textContent = stroke.name;
            
            // 这里应该添加语音提示当前选择的笔画
            // 在实际应用中，可以使用语音合成API
            console.log("当前选择的笔画:", stroke.name);
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            updateStrokeDisplay();
            
            // 设置导航按钮事件
            document.getElementById('prev-stroke').addEventListener('click', function() {
                currentStrokeIndex = (currentStrokeIndex - 1 + strokes.length) % strokes.length;
                updateStrokeDisplay();
            });
            
            document.getElementById('next-stroke').addEventListener('click', function() {
                currentStrokeIndex = (currentStrokeIndex + 1) % strokes.length;
                updateStrokeDisplay();
            });
            
            // 在实际应用中，应增加触摸反馈和语音引导
        });
    </script>
</body>
</html>
