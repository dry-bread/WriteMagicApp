<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整签名训练 - 汉字书写学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f8f8f8;
            color: #333;
            font-size: 16px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        
        .back-button {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .app-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
        }
        
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        
        .name-display-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .name-info {
            display: flex;
            align-items: center;
        }
        
        .current-name {
            font-size: 1.8rem;
            color: #2ecc71;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .mode-selector {
            display: flex;
            background-color: #f1f1f1;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .mode-option {
            padding: 8px 12px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 0.9rem;
        }
        
        .mode-option.active {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
        }
        
        .practice-container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .practice-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .canvas-container {
            position: relative;
            border: 2px dashed #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        #signature-canvas {
            width: 100%;
            height: 500px;
            background-color: #f9f9f9;
            touch-action: none;
        }
        
        .guide-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            pointer-events: none;
        }
        
        .grid-cell {
            border: 1px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: rgba(0, 0, 0, 0.1);
        }
        
        .control-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        
        .control-button {
            padding: 12px 0;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            font-size: 1.1rem;
            flex: 1;
        }
        
        .guide-button {
            background-color: #3498db;
            color: white;
        }
        
        .guide-button:hover {
            background-color: #2980b9;
        }
        
        .reset-button {
            background-color: #e74c3c;
            color: white;
        }
        
        .reset-button:hover {
            background-color: #c0392b;
        }
        
        .complete-button {
            background-color: #2ecc71;
            color: white;
        }
        
        .complete-button:hover {
            background-color: #27ae60;
        }
        
        .scenario-selector {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .scenario-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .scenario-title-icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }
        
        .scenario-options {
            display: flex;
            gap: 10px;
        }
        
        .scenario-option {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            background-color: #f1f9f1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .scenario-option.active {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
        }
        
        .scenario-option:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        .assistant-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #2ecc71;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }
        
        .assistant-button:hover, .assistant-button:focus {
            background-color: #27ae60;
        }
        
        footer {
            text-align: center;
            padding: 15px;
            background-color: #f1f1f1;
            color: #777;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <header>
        <a href="index.html" class="back-button">←</a>
        <h1 class="app-title">完整签名训练</h1>
        <button id="voice-assist" style="position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 22px;">🔊</button>
    </header>
    
    <!-- 主要内容区域 -->
    <div class="main-content">
        <!-- 简化的名字显示栏 -->
        <div class="name-display-bar">
            <div class="name-info">
                <div class="current-name" id="current-name">李明</div>
            </div>
            <div class="mode-selector">
                <div class="mode-option active" onclick="switchMode('guided')">引导模式</div>
                <div class="mode-option" onclick="switchMode('free')">自由模式</div>
            </div>
        </div>
        
        <!-- 扩大的练习区域 -->
        <div class="practice-container">
            <div class="practice-title">
                <span>签名练习区域</span>
                <span style="font-size: 0.9rem; color: #666;">请完整书写您的姓名</span>
            </div>
            
            <div class="canvas-container">
                <canvas id="signature-canvas"></canvas>
                <div class="guide-grid">
                    <div class="grid-cell">李</div>
                    <div class="grid-cell">明</div>
                </div>
            </div>
            
            <div class="control-buttons">
                <button class="control-button guide-button">
                    <span style="margin-right: 5px;">👆</span>触感引导
                </button>
                <button class="control-button reset-button">
                    <span style="margin-right: 5px;">🔄</span>重新开始
                </button>
                <button class="control-button complete-button">
                    <span style="margin-right: 5px;">✓</span>完成练习
                </button>
            </div>
        </div>
        
        <!-- 精简的场景选择器 -->
        <div class="scenario-selector">
            <div class="scenario-title">
                <span class="scenario-title-icon">🎯</span>
                <span>选择练习场景</span>
            </div>
            <div class="scenario-options">
                <div class="scenario-option active" onclick="selectScenario('bank')">
                    银行开卡
                </div>
                <div class="scenario-option" onclick="selectScenario('express')">
                    快递签收
                </div>
                <div class="scenario-option" onclick="selectScenario('contract')">
                    合同签署
                </div>
            </div>
        </div>
    </div>
    
    <!-- 更大的语音助手按钮 -->
    <button class="assistant-button" aria-label="语音助手">🗣️</button>
    
    <footer>
        视障人士汉字书写学习应用 © 2023
    </footer>
    
    <script>
        // 定义变量和数据
        const scenarios = [
            { id: 'bank', name: '银行开卡', desc: '在银行开卡申请表上签名' },
            { id: 'express', name: '快递签收', desc: '在快递单上签收' },
            { id: 'contract', name: '合同签署', desc: '在合同上签名' }
        ];
        
        let currentScenario = 'bank';
        let currentMode = 'guided';
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新UI
            const modeOptions = document.querySelectorAll('.mode-option');
            modeOptions.forEach(option => {
                option.classList.remove('active');
            });
            
            document.querySelector(`.mode-option:nth-child(${mode === 'guided' ? 1 : 2})`).classList.add('active');
            
            // 在实际应用中，应播放语音提示
            console.log(`已切换到${mode === 'guided' ? '引导' : '自由'}模式`);
            
            // 重置画布
            resetCanvas();
        }
        
        // 选择场景
        function selectScenario(scenarioId) {
            currentScenario = scenarioId;
            
            // 更新UI
            const scenarioOptions = document.querySelectorAll('.scenario-option');
            scenarioOptions.forEach(option => {
                option.classList.remove('active');
            });
            
            const index = scenarios.findIndex(s => s.id === scenarioId);
            document.querySelector(`.scenario-option:nth-child(${index + 1})`).classList.add('active');
            
            // 找到对应场景
            const scenario = scenarios.find(s => s.id === scenarioId);
            
            // 在实际应用中，应播放语音提示
            console.log(`已选择${scenario.name}场景: ${scenario.desc}`);
            
            // 重置画布
            resetCanvas();
        }
        
        // 重置画布
        function resetCanvas() {
            // 清空画布
            const canvas = document.getElementById('signature-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 在实际应用中，应播放语音提示
            console.log("画布已重置，请开始签名");
        }
        
        // 触感引导
        function provideHapticGuidance() {
            // 在实际应用中，应触发振动反馈
            console.log("触发触感引导");
            alert("触感引导已启动，请感受振动模式");
            // 这里应该有触发设备振动的代码
        }
        
        // 完成练习
        function completeExercise() {
            // 在实际应用中，应保存签名，播放语音提示
            console.log("练习完成");
            alert("恭喜！您已完成签名练习。");
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 设置画布大小
            const canvas = document.getElementById('signature-canvas');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // 绑定按钮事件
            document.querySelector('.guide-button').addEventListener('click', provideHapticGuidance);
            document.querySelector('.reset-button').addEventListener('click', resetCanvas);
            document.querySelector('.complete-button').addEventListener('click', completeExercise);
            
            // 在实际应用中，应初始化画布绘制功能，添加触摸反馈和语音引导
        });
    </script>
</body>
</html>
